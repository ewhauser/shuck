legacy_code: SH-180
legacy_name: multi-var-for-loop
new_category: Portability
new_code: X047
runtime_kind: ast
shellcheck_code: SC1058
shells:
  - sh
  - bash
  - dash
  - ksh
description: "A `for` loop binds more than one variable per iteration."
rationale: Use a single loop variable and unpack values inside the body.
source:
  shell_checks_rule: rules/SH-180.yaml
  shell_checks_example: examples/180.sh
examples:
  - kind: invalid
    source: shell-checks/examples/180.sh
    code: |
      #!/bin/sh
      # shellcheck disable=1009,1072,1073
      for key val in a 1 b 2; do echo "$key=$val"; done
