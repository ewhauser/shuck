legacy_code: SH-090
legacy_name: space-after-equals
new_category: Correctness
new_code: C026
runtime_kind: ast
shells:
  - sh
  - bash
  - dash
  - ksh
description: "A space after `=` turns an assignment into a command."
rationale: Write assignments without spaces, or quote an empty value explicitly.
source:
  shell_checks_rule: rules/SH-090.yaml
  shell_checks_example: examples/090.sh
examples:
  - kind: invalid
    source: shell-checks/examples/090.sh
    code: |
      #!/bin/sh
      name= value
