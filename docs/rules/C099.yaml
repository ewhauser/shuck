description: An all-elements positional or array expansion is assigned to a scalar value, collapsing the elements into one string.
rationale: "Use an array assignment when element boundaries matter, or join the values explicitly when a single string is intended."
safe_fix: false
fix_description: "Rewrite the scalar assignment as an explicit array assignment or intentional join."
