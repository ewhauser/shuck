legacy_code: SH-304
legacy_name: source-inside-function-in-sh
new_category: Portability
new_code: X080
runtime_kind: ast
shellcheck_code: SC3051
shellcheck_level: warning
shells:
  - sh
  - dash
description: "A directive-pinned `source` command is used inside a function in POSIX sh."
rationale: "Use the portable `.` (dot) command instead of `source`. Plain `source` usage in POSIX shells is covered by X031/SC3046; X080 follows the narrower SC3051 behavior for source commands with explicit source directives."
safe_fix: false
fix_description: Replace the leading `source` command word with `.`, leaving the remaining operands unchanged.
source:
  shell_checks_rule: rules/SH-304.yaml
  shell_checks_example: examples/304.sh
examples:
  - kind: invalid
    source: shell-checks/examples/304.sh
    code: |
      #!/bin/sh
      # shellcheck disable=1090,1091,3046
      myfunc() {
      	# shellcheck source=/dev/null
      	source "$1"
      }
      myfunc ./config.sh
