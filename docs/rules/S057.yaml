legacy_code: SH-235
legacy_name: function-in-alias
new_category: Style
new_code: S057
runtime_kind: ast
shellcheck_code: SC2142
shellcheck_level: error
shells:
  - sh
  - bash
  - dash
  - ksh
description: An alias definition contains a positional parameter reference.
rationale: Aliases are expanded before positional parameters are resolved for the invoked command. Use a function when the replacement text needs arguments.
safe_fix: false
fix_description: "Replace the alias with a function that accepts positional parameters directly."
source:
  shell_checks_rule: rules/SH-235.yaml
  shell_checks_example: examples/235.sh
examples:
  - kind: invalid
    source: shell-checks/examples/235.sh
    code: |
      #!/bin/sh
      # shellcheck disable=2034
      alias greet='printf "%s\n" "$1"'
