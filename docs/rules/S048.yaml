legacy_code: SH-202
legacy_name: dollar-in-arithmetic-context
new_category: Style
new_code: S048
runtime_kind: ast
shellcheck_code: SC2297
shells:
  - sh
  - bash
  - dash
description: A dollar-prefixed variable is used in a double-parenthesis expansion.
rationale: "Drop the `$` prefix inside `$(( ))` since variables expand implicitly."
source:
  shell_checks_rule: rules/SH-202.yaml
  shell_checks_example: examples/202.sh
examples:
  - kind: invalid
    source: shell-checks/examples/202.sh
    code: |
      #!/bin/bash
      # shellcheck disable=2034,2004
      x=$(( $RANDOM / 24 * 3 ))
