legacy_code: SH-305
legacy_name: star-glob-removal-in-sh
new_category: Portability
new_code: X081
runtime_kind: ast
shellcheck_code: SC3058
shellcheck_level: warning
shells:
  - sh
  - dash
description: "Pattern trimming on `$*` or `$@` is not portable in POSIX `sh`."
rationale: "Assign `$*` or `$@` to a variable first, then apply any `#`, `##`, `%`, or `%%` trimming to that variable."
safe_fix: false
fix_description: Assign `$*` or `$@` to a temporary variable first, then apply the reported pattern-trimming operator to that variable.
source:
  shell_checks_rule: rules/SH-305.yaml
  shell_checks_example: examples/305.sh
examples:
  - kind: invalid
    source: shell-checks/examples/305.sh
    code: |
      #!/bin/sh
      # shellcheck disable=2154
      echo "${*%%dBm*}" > /tmp/signal.txt
      echo "${@##*.}"
