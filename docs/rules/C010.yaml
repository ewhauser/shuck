    code: |
      #!/bin/sh
      x=foo
      [ "$x" = foo ] && printf '%s\n' yes || rm -f no
  - kind: invalid
    code: |
      #!/bin/bash
      # shellcheck disable=2086
      [ $DIR = vendor ] && mv go-* $DIR || mv pkg-* $DIR
