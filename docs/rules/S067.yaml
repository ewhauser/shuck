legacy_code: SH-294
legacy_name: leading-glob-in-grep-pattern
new_category: Style
new_code: S067
runtime_kind: ast
shellcheck_code: SC2063
shellcheck_level: warning
shells:
  - sh
  - bash
  - dash
  - ksh
description: A grep pattern starts with `*`, which reads like a shell glob instead of a regex.
rationale: "Use `.*text` to match any prefix in regex mode, or escape a literal `*` if that character is part of the pattern."
safe_fix: false
fix_description: null
source:
  shell_checks_rule: rules/SH-294.yaml
  shell_checks_example: examples/294.sh
examples:
  - kind: invalid
    source: shell-checks/examples/294.sh
    code: |
      #!/bin/sh
      maintainer=$(grep -E -i "*MAINTAINER" "$AUDIT_FILE" | sed 's/=/ /g')
