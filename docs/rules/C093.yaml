legacy_code: SH-221
legacy_name: backtick-in-command-position
new_category: Correctness
new_code: C093
runtime_kind: ast
shellcheck_code: SC2316
shells:
  - sh
  - bash
  - dash
  - ksh
description: A backtick command substitution is used as a command name.
rationale: Remove the backticks and run the command directly or use a variable.
source:
  shell_checks_rule: rules/SH-221.yaml
  shell_checks_example: examples/221.sh
examples:
  - kind: invalid
    source: shell-checks/examples/221.sh
    code: |
      #!/bin/sh
      # shellcheck disable=2006,2116
      `echo hello` | cat
