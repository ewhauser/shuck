legacy_code: SH-196
legacy_name: echo-to-sed-substitution
new_category: Style
new_code: S044
runtime_kind: ast
shellcheck_code: SC2001
shells:
  - bash
  - ksh
description: A plain echo-to-sed rewrite can be folded into shell-native substitution.
rationale: Prefer the shell's built-in rewrite features over spawning sed for a single inline edit.
source:
  shell_checks_rule: rules/SH-196.yaml
  shell_checks_example: examples/196.sh
examples:
  - kind: invalid
    source: shell-checks/examples/196.sh
    code: |
      #!/bin/bash
      value="$(echo "$VERSION" | sed 's|foo|bar|g')"
      printf '%s\n' "$value"
