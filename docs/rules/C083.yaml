legacy_code: SH-209
legacy_name: glob-in-find-substitution
new_category: Correctness
new_code: C083
runtime_kind: ast
shellcheck_code: SC2061
shells:
  - sh
  - bash
  - dash
  - ksh
description: "A glob pattern inside a `find` command substitution may expand early."
rationale: "Quote the glob or use `find -name '*.ext'` with quotes."
safe_fix: false
fix_description: "Quote the entire reported `find` pattern operand."
source:
  shell_checks_rule: rules/SH-209.yaml
  shell_checks_example: examples/209.sh
examples:
  - kind: invalid
    source: shell-checks/examples/209.sh
    code: |
      #!/bin/bash
      # shellcheck disable=2044,2035
      for f in $(find ./ -name *.jar); do echo "$f"; done
