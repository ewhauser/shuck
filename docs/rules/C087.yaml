legacy_code: SH-214
legacy_name: string-comparison-for-version
new_category: Correctness
new_code: C087
runtime_kind: ast
shellcheck_code: SC2072
shellcheck_level: error
shells:
  - sh
  - bash
  - dash
description: "A `<` or `>` operator inside `[[ ]]` compares decimal-like values lexicographically, so strings such as `1.27` are not ordered numerically."
rationale: "Use `-lt` or `-gt` for integer comparisons, or a version-aware tool when comparing release strings."
safe_fix: false
fix_description: null
source:
  shell_checks_rule: rules/SH-214.yaml
  shell_checks_example: examples/214.sh
examples:
  - kind: invalid
    source: shell-checks/examples/214.sh
    code: |
      #!/bin/bash
      # shellcheck disable=2154
      if [[ $ver < 1.27 ]]; then echo old; fi
  - kind: invalid
    code: |
      #!/bin/bash
      if [[ "$actual" > "0.8" ]]; then
        echo new
      fi
