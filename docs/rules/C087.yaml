legacy_code: SH-214
legacy_name: string-comparison-for-version
new_category: Correctness
new_code: C087
runtime_kind: ast
shellcheck_code: SC2072
shellcheck_level: error
shells:
  - sh
  - bash
  - dash
description: "A `<` or `>` operator inside `[[ ]]` compares dotted numeric values lexicographically, so version-like strings such as `2.5.1` are not ordered by version semantics."
rationale: "Use `-lt` or `-gt` for integer comparisons, or a version-aware tool for dotted version strings."
safe_fix: false
fix_description: null
source:
  shell_checks_rule: rules/SH-214.yaml
  shell_checks_example: examples/214.sh
examples:
  - kind: invalid
    source: shell-checks/examples/214.sh
    code: |
      #!/bin/bash
      # shellcheck disable=2154
      if [[ $ver < 1.27 ]]; then echo old; fi
  - kind: invalid
    code: |
      #!/bin/bash
      if [[ "$actual" > "0.8" ]]; then
        echo new
      fi
  - kind: invalid
    code: |
      #!/bin/bash
      current=$(cat ~/.immich)
      if [[ $current > 2.5.1 ]]; then
        echo upgrade
      fi
