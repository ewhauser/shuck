legacy_code: SH-063
legacy_name: quoted-dollar-star-loop
new_category: Style
new_code: S015
runtime_kind: ast
shellcheck_code: SC2066
shells:
  - sh
  - bash
  - dash
  - ksh
description: Using "$*" as the loop list makes the loop iterate once over one combined string instead of once per positional parameter.
rationale: Use "$@" or the implicit for item; do ...; done form when the loop should visit each positional parameter separately.
source:
  shell_checks_rule: rules/SH-063.yaml
  shell_checks_example: examples/063.sh
examples:
  - kind: invalid
    source: shell-checks/examples/063.sh
    code: |
      #!/bin/sh
      for a in "$*"; do printf '%s\n' "$a"; done
