legacy_code: SH-063
legacy_name: quoted-dollar-star-loop
new_category: Style
new_code: S015
runtime_kind: ast
shellcheck_code: SC2066
shells:
  - sh
  - bash
  - dash
  - ksh
description: Putting "$*" in a loop turns every positional parameter into one combined item.
rationale: Use "$@" if the loop should process each positional parameter on its own.
source:
  shell_checks_rule: rules/SH-063.yaml
  shell_checks_example: examples/063.sh
examples:
  - kind: invalid
    source: shell-checks/examples/063.sh
    code: |
      #!/bin/sh
      for a in "$*"; do printf '%s\n' "$a"; done
