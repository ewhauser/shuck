legacy_code: SH-207
legacy_name: escaped-negation-in-test
new_category: Correctness
new_code: C082
runtime_kind: ast
shellcheck_code: SC2057
shells:
  - sh
  - bash
  - dash
  - ksh
description: "A backslash-escaped `!` is used in a test expression."
rationale: "Use `!` without the backslash for negation in test."
safe_fix: true
fix_description: "Remove the backslash before the leading `!` in the test expression."
source:
  shell_checks_rule: rules/SH-207.yaml
  shell_checks_example: examples/207.sh
examples:
  - kind: invalid
    source: shell-checks/examples/207.sh
    code: |
      #!/bin/bash
      # shellcheck disable=2154,2086
      if [ \! -f $file ]; then echo missing; fi
