legacy_code: SH-170
legacy_name: redundant-return-status
new_category: Style
new_code: S038
runtime_kind: ast
shellcheck_code: SC2265
shells:
  - sh
  - bash
  - dash
  - ksh
description: Returns the exit status that the function would already propagate.
rationale: Omit the explicit return when the last command status is the desired result.
source:
  shell_checks_rule: rules/SH-170.yaml
  shell_checks_example: examples/170.sh
examples:
  - kind: invalid
    source: shell-checks/examples/170.sh
    code: |
      #!/bin/sh
      f() {
        echo hello > /dev/null
        return $?
      }
      f
