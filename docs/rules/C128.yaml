legacy_code: SH-301
legacy_name: case-glob-reachability
new_category: Correctness
new_code: C128
runtime_kind: ast
shellcheck_code: SC2221
shellcheck_level: warning
shells:
  - sh
  - bash
  - dash
  - ksh
description: A case glob pattern may shadow a later arm.
rationale: Reorder case arms so more specific patterns come first.
safe_fix: false
fix_description: "Delete the reported shadowing case-pattern alternative; if that leaves the arm with no patterns, delete the arm."
source:
  shell_checks_rule: rules/SH-301.yaml
  shell_checks_example: examples/301.sh
examples:
  - kind: invalid
    source: shell-checks/examples/301.sh
    code: |
      #!/bin/bash
      backend="x11-sdl"
      case "$backend" in
          x11*)
              params="-fullscreen"
              ;;
          default|x11*)
              params="-windowed"
              ;;
      esac
      echo "$params"
