legacy_code: SH-213
legacy_name: greater-than-in-test
new_category: Correctness
new_code: C086
runtime_kind: ast
shellcheck_code: SC2071
shellcheck_level: error
shells:
  - sh
  - bash
  - dash
  - ksh
description: "A numeric comparison uses `<` or `>` instead of `-lt` or `-gt`."
rationale: "Use `-lt` or `-gt` for integer comparisons. Inside `[ ]`, raw `<` or `>` redirects instead of comparing; inside `[[ ]]`, they order text lexicographically."
safe_fix: false
fix_description: "Replace the reported `<` or `>` operator with `-lt` or `-gt`."
source:
  shell_checks_rule: rules/SH-213.yaml
  shell_checks_example: examples/213.sh
examples:
  - kind: invalid
    source: shell-checks/examples/213.sh
    code: |
      #!/bin/bash
      # shellcheck disable=2154
      if [ "$version" > "10" ]; then echo newer; fi
  - kind: invalid
    code: |
      #!/bin/bash
      if [[ $count < 1 ]]; then
        echo empty
      fi
