legacy_code: SH-269
legacy_name: c-style-for-arithmetic-in-sh
new_category: Portability
new_code: X062
runtime_kind: ast
shellcheck_code: SC3018
shellcheck_level: warning
shells:
  - sh
  - dash
description: Arithmetic increment and decrement operators use non-POSIX syntax in `sh` scripts.
rationale: Spell increment and decrement updates out explicitly, or switch to a shell that supports `++` and `--`.
safe_fix: false
fix_description: Rewrite each reported `++` or `--` as an explicit arithmetic assignment.
source:
  shell_checks_rule: rules/SH-269.yaml
  shell_checks_example: examples/269.sh
examples:
  - kind: invalid
    source: shell-checks/examples/269.sh
    code: |
      #!/bin/sh
      # shellcheck disable=3005,3010
      for ((i = 0; i < 3; i++)); do echo "$i"; done
  - kind: invalid
    code: |
      #!/bin/sh
      ((count++))
