legacy_code: SH-300
legacy_name: getopts-invalid-flag-handler
new_category: Style
new_code: S069
runtime_kind: ast
shellcheck_code: SC2220
shellcheck_level: warning
shells:
  - sh
  - bash
  - dash
  - ksh
description: A getopts case handler has no branch for invalid option flags.
rationale: Add a catch-all branch or an explicit `\?` arm so unexpected flags do not fall through the getopts dispatch.
safe_fix: false
fix_description: null
source:
  shell_checks_rule: rules/SH-300.yaml
  shell_checks_example: examples/300.sh
examples:
  - kind: invalid
    source: shell-checks/examples/300.sh
    code: |
      #!/bin/sh
      while getopts ":a" opt; do
          case "$opt" in
          a) : ;;
          :) : ;;
          esac
      done
