name: Fuzz

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10

jobs:
  cargo-fuzz:
    name: "cargo fuzz (${{ matrix.target }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.repository == 'ewhauser/shuck' || github.event_name != 'schedule' }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - parser_fuzz
          - lexer_fuzz
          - arithmetic_fuzz
          - glob_fuzz
          - recovered_parser_fuzz
          # - formatter_consistency_fuzz
          # - formatter_validity_fuzz
          - linter_no_panic_fuzz
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: "Install nightly toolchain"
        run: rustup toolchain install nightly --profile minimal
      - name: "Install cargo-fuzz"
        run: cargo fuzz --help >/dev/null 2>&1 || cargo install cargo-fuzz --locked
      - name: "Initialize fuzz corpus"
        run: bash ./scripts/fuzz-init.sh --ci
      - name: "Run cargo-fuzz target"
        run: |
          mkdir -p "fuzz/artifacts/${{ matrix.target }}"
          cd fuzz
          cargo +nightly fuzz run -s none "${{ matrix.target }}" -- \
            -artifact_prefix="artifacts/${{ matrix.target }}/" \
            -max_total_time=300
      - name: "Upload cargo-fuzz artifacts"
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: cargo-fuzz-${{ matrix.target }}-artifacts
          if-no-files-found: ignore
          path: fuzz/artifacts/${{ matrix.target }}

  cli-fuzz:
    name: "cli fuzz"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: ${{ github.repository == 'ewhauser/shuck' || github.event_name != 'schedule' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: "Build shuck"
        run: cargo build -p shuck-cli
      - name: "Run CLI fuzzers"
        run: |
          status=0
          python3 ./scripts/fuzz_cli.py \
            --shuck-bin ./target/debug/shuck \
            --dialect sh \
            --profile full \
            --count 500 \
            --seed "${GITHUB_RUN_ID}" \
            --workers 4 \
            --artifact-dir fuzz/artifacts/cli || status=$?
          python3 ./scripts/fuzz_cli.py \
            --shuck-bin ./target/debug/shuck \
            --dialect bash \
            --profile full \
            --count 500 \
            --seed "$((GITHUB_RUN_ID + 500))" \
            --workers 4 \
            --artifact-dir fuzz/artifacts/cli || status=$?
          exit "${status}"
      - name: "Upload CLI fuzz artifacts"
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: cli-fuzz-artifacts
          if-no-files-found: ignore
          path: fuzz/artifacts/cli

  create-issue-on-failure:
    name: "Create issue on scheduled failure"
    runs-on: ubuntu-latest
    needs:
      - cargo-fuzz
      - cli-fuzz
    if: ${{ github.repository == 'ewhauser/shuck' && always() && github.event_name == 'schedule' && (needs.cargo-fuzz.result != 'success' || needs.cli-fuzz.result != 'success') }}
    permissions:
      actions: read
      issues: write
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const failedJobs = [];
            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });

            for (const job of jobs) {
              if (job.conclusion && job.conclusion !== "success") {
                failedJobs.push(`- ${job.name} (${job.conclusion})`);
              }
            }

            const title = `Scheduled fuzz failed on ${new Date().toISOString().slice(0, 10)}`;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "Scheduled fuzzing failed.",
              "",
              `Run: ${runUrl}`,
              "",
              "Failed jobs:",
              failedJobs.length ? failedJobs.join("\n") : "- unknown",
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["bug", "fuzz"],
            });
