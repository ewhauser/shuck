name: Publish to crates.io

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run only (no upload)"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: crates-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: release
    # id-token: write is required for crates.io trusted publishing via OIDC.
    # The crate must also have GitHub Actions trust configured on crates.io
    # (Settings → Trusted Publishing) for this repo/workflow.
    permissions:
      contents: read
      id-token: write
    env:
      CARGO_TERM_COLOR: always
      CARGO_NET_RETRY: 10
      RUSTUP_MAX_RETRIES: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Resolve publish flags
        id: flags
        env:
          EVENT_NAME: ${{ github.event_name }}
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DRY_RUN_INPUT" = "true" ]; then
            echo "flag=--dry-run" >> "$GITHUB_OUTPUT"
            echo "Dry-run mode: skipping upload"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
            echo "Publish mode: uploads enabled"
          fi

      - name: Authenticate to crates.io (trusted publishing)
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: crates-auth

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
          PUBLISH_FLAG: ${{ steps.flags.outputs.flag }}
        run: |
          set -euo pipefail

          # Publish order follows the internal dependency graph, deepest first.
          # shuck-benchmark is publish = false and excluded.
          crates=(
            shuck-ast
            shuck-format
            shuck-parser
            shuck-indexer
            shuck-cache
            shuck-semantic
            shuck-linter
            shuck-formatter
            shuck-cli
          )

          for crate in "${crates[@]}"; do
            echo "::group::Publishing ${crate}"
            cargo publish -p "${crate}" --locked ${PUBLISH_FLAG}
            echo "::endgroup::"
            if [ -z "${PUBLISH_FLAG}" ]; then
              # Give the crates.io index a moment to propagate before the next crate
              # depends on it. Skip during dry-run where nothing is uploaded.
              sleep 20
            fi
          done
