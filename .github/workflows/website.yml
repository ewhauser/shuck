name: Website

on:
  release:
    types: [published]
  pull_request:
    paths:
      - "website/**"
      - "scripts/benchmarks/**"
      - "crates/shuck-benchmark/resources/**"
      - "Makefile"
      - ".github/workflows/website.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: website

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          run_install: false
          package_json_file: website/package.json

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  deploy:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: "pages-website"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Install benchmark dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y hyperfine shellcheck

      - name: Generate CI benchmark snapshot
        id: benchmark_snapshot
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        env:
          SHUCK_BENCHMARK_OUTPUT_DIR: ${{ runner.temp }}/website-benchmarks
        run: |
          mkdir -p "$SHUCK_BENCHMARK_OUTPUT_DIR"
          ./scripts/benchmarks/setup.sh hyperfine shellcheck
          ./scripts/benchmarks/run.sh
          python3 ./scripts/benchmarks/export_website_data.py \
            --repo-root . \
            --bench-dir "$SHUCK_BENCHMARK_OUTPUT_DIR" \
            --output website/generated/benchmarks/ci-latest.json \
            --dataset-id ci-latest \
            --dataset-name "GitHub Actions latest release snapshot" \
            --dataset-description "Regenerated during the GitHub Pages deploy for the latest published release." \
            --environment-kind ci \
            --environment-label "GitHub Actions ubuntu-latest" \
            --source-command "make bench-macro" \
            --notes "This snapshot is rebuilt during every Pages deploy for the latest published release." \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Note benchmark fallback
        if: steps.benchmark_snapshot.outcome != 'success'
        run: echo "Benchmark generation failed; building the site with the checked-in fallback JSON."

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          run_install: false
          package_json_file: website/package.json

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export
        env:
          SHUCK_WEBSITE_EXPORT: "1"
          SHUCK_WEBSITE_BASE_PATH: /shuck
          NEXT_PUBLIC_SITE_URL: https://ewhauser.github.io/shuck
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: website/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
