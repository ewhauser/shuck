name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10

jobs:
  nix-flake-check:
    name: "nix flake check"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/flakehub-cache-action@main
      - run: nix flake check

  zizmor:
    name: "zizmor"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
      - name: "Check release workflow security hardening"
        run: python3 scripts/check-release-security.py check

  cargo-fmt:
    name: "cargo fmt"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: "Install Rust toolchain"
        run: rustup component add rustfmt
      - run: cargo fmt --all --check

  cargo-clippy:
    name: "cargo clippy"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: "Install Rust toolchain"
        run: rustup component add clippy
      - name: "Fetch dependencies"
        run: cargo fetch
      - name: "Clippy"
        run: cargo clippy --workspace --all-targets --all-features --offline -- -D warnings

  cargo-test-linux:
    name: "cargo test (linux)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: "Install Rust toolchain"
        run: rustup show
      - name: "Run tests"
        run: cargo test --workspace --all-features
      - run: cargo doc --all --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  cargo-test-other:
    strategy:
      matrix:
        platform:
          - windows-latest
          - macos-latest
    name: "cargo test (${{ matrix.platform }})"
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: "Install Rust toolchain"
        run: rustup show
      - name: "Run tests"
        run: cargo test --workspace --all-features

  fuzz-smoke:
    name: "fuzz smoke"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: "Install nightly toolchain"
        run: rustup toolchain install nightly --profile minimal
      - name: "Install cargo-fuzz"
        run: cargo fuzz --help >/dev/null 2>&1 || cargo install cargo-fuzz --locked
      - name: "Run cargo-fuzz smoke targets"
        run: make fuzz-smoke
      - name: "Build shuck"
        run: cargo build -p shuck
      - name: "Run CLI fuzzer smoke (sh)"
        run: python3 ./scripts/fuzz_cli.py --shuck-bin ./target/debug/shuck --dialect sh --profile smoke --count 25 --seed 0 --workers 1
      - name: "Run CLI fuzzer smoke (bash)"
        run: python3 ./scripts/fuzz_cli.py --shuck-bin ./target/debug/shuck --dialect bash --profile smoke --count 25 --seed 25 --workers 1
      - name: "Upload fuzz artifacts"
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: fuzz-smoke-artifacts
          if-no-files-found: ignore
          path: fuzz/artifacts

  large-corpus:
    name: "large corpus"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: "Install Nix"
        uses: DeterminateSystems/determinate-nix-action@v3
      - uses: DeterminateSystems/flakehub-cache-action@main
      - name: "Download large corpus cache"
        run: |
          gh release download v0.0.0-test-files -R ewhauser/shuck -p 'shuck-cache.tar.zst' -D /tmp
          echo "d82829eed9a0ba09d5dc5fc30f29f7cb445c5fb82cfaf5d98917ac98b278ab09  /tmp/shuck-cache.tar.zst" | sha256sum -c -
        env:
          GH_TOKEN: ${{ github.token }}
      - name: "Extract large corpus cache"
        run: tar --zstd -xf /tmp/shuck-cache.tar.zst -C "$GITHUB_WORKSPACE"
      - name: "Run large corpus tests"
        id: large-corpus
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p target/large-corpus-report
          nix develop --command make NIX_DEVELOP= test-large-corpus 2>&1 | tee target/large-corpus-report/latest.log | python3 scripts/compact_large_corpus_log.py
      - name: "Generate HTML report"
        id: report
        if: always() && steps.large-corpus.outcome != 'cancelled'
        run: |
          mkdir -p target/pages/reports/corpus
          python3 scripts/large_corpus_report.py --log target/large-corpus-report/latest.log --output target/pages/reports/corpus/index.html
      - name: "Upload report artifact"
        if: always() && steps.report.outcome == 'success'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: large-corpus-report
          path: target/pages
      - name: "Summarize large corpus result"
        if: always()
        run: |
          echo "Large corpus test outcome: ${{ steps.large-corpus.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.large-corpus.outcome }}" = "failure" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "This job is non-blocking, so large corpus failures are reported without failing CI." >> "$GITHUB_STEP_SUMMARY"
          fi
