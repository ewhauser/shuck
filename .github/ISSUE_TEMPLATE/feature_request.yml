name: Feature request
description: Suggest a new feature, lint rule, or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the use case so we can evaluate it. For proposed new lint rules, include a small example of the pattern you want detected and why it matters.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What's currently getting in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like shuck to behave? For a new rule, include sample shell input and the diagnostic you'd expect.
      render: bash
    validations:
      required: true
  - type: input
    id: shellcheck-code
    attributes:
      label: Related ShellCheck code (if any)
      description: If this maps to an existing ShellCheck diagnostic, include its `SCNNNN` code.
      placeholder: e.g. SC2086
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or existing tools you've tried.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links to related issues, prior art, or anything else that helps frame the request.
