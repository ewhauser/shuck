version: 1
contracts:
  - id: zsh/oh-my-zsh/theme/sonicradish/prompt-prefixes
    groups:
      - zsh
      - zsh/oh-my-zsh
      - zsh/oh-my-zsh/theme
      - zsh/oh-my-zsh/theme/sonicradish
    label: Oh My Zsh sonicradish theme prompt configuration prefixes
    when:
      type: always
    match:
      shell: zsh_or_unknown
      source:
        assigns-any-prefixes:
          - ZSH_THEME_
    files:
      - "**/oh-my-zsh/themes/sonicradish.zsh-theme"
      - "**/ohmyzsh/themes/sonicradish.zsh-theme"
    effects:
      consumes:
        prefixes:
          - ZSH_THEME_
