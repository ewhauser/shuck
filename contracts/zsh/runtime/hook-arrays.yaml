version: 1
contracts:
  - id: zsh/runtime/hook-arrays/initialized
    groups:
      - zsh
      - zsh/runtime
    label: Zsh hook arrays available on runtime paths
    when:
      type: always
    match:
      shell: zsh_runtime
      source:
        mentions-any-names:
          - chpwd_functions
          - periodic_functions
          - precmd_functions
          - preexec_functions
          - zsh_directory_name_functions
          - zshaddhistory_functions
          - zshexit_functions
    files:
      - "**/.zshrc"
      - "**/zshrc"
      - "**/.zshenv"
      - "**/zshenv"
      - "**/.zprofile"
      - "**/zprofile"
      - "**/.zlogin"
      - "**/zlogin"
      - "**/.zlogout"
      - "**/zlogout"
      - "**/zdot/**"
      - "**/zsh/config/**"
      - "**/zsh/configs/**"
      - "**/completion/**"
      - "**/completions/**"
      - "**/functions/**"
      - "**/highlighters/**"
      - "**/lib/**"
      - "**/modules/**"
      - "**/plugins/**"
      - "**/plugin/**"
      - "**/themes/**"
      - "**/*.plugin.zsh"
      - "**/*.theme.zsh"
      - "**/.oh-my-zsh/**"
      - "**/oh-my-zsh/**"
      - "**/ohmyzsh/**"
      - "**/powerlevel10k/**"
      - "**/prezto/**"
      - "**/zinit/**"
      - "**/zsh-autosuggestions/**"
      - "**/zsh-syntax-highlighting/**"
    effects:
      provides:
        variables:
          - chpwd_functions
          - periodic_functions
          - precmd_functions
          - preexec_functions
          - zsh_directory_name_functions
          - zshaddhistory_functions
          - zshexit_functions

  - id: zsh/runtime/hook-arrays/consumed
    groups:
      - zsh
      - zsh/runtime
    label: Zsh hook arrays consumed after sourcing
    when:
      type: always
    match:
      shell: zsh_runtime
      source:
        assigns-any-names:
          - chpwd_functions
          - periodic_functions
          - precmd_functions
          - preexec_functions
          - zsh_directory_name_functions
          - zshaddhistory_functions
          - zshexit_functions
    files:
      - "**/.zshrc"
      - "**/zshrc"
      - "**/.zshenv"
      - "**/zshenv"
      - "**/.zprofile"
      - "**/zprofile"
      - "**/.zlogin"
      - "**/zlogin"
      - "**/.zlogout"
      - "**/zlogout"
      - "**/zdot/**"
      - "**/zsh/config/**"
      - "**/zsh/configs/**"
      - "**/completion/**"
      - "**/completions/**"
      - "**/functions/**"
      - "**/highlighters/**"
      - "**/lib/**"
      - "**/modules/**"
      - "**/plugins/**"
      - "**/plugin/**"
      - "**/themes/**"
      - "**/*.plugin.zsh"
      - "**/*.theme.zsh"
      - "**/.oh-my-zsh/**"
      - "**/oh-my-zsh/**"
      - "**/ohmyzsh/**"
      - "**/powerlevel10k/**"
      - "**/prezto/**"
      - "**/zinit/**"
      - "**/zsh-autosuggestions/**"
      - "**/zsh-syntax-highlighting/**"
    effects:
      consumes:
        names:
          - chpwd_functions
          - periodic_functions
          - precmd_functions
          - preexec_functions
          - zsh_directory_name_functions
          - zshaddhistory_functions
          - zshexit_functions
