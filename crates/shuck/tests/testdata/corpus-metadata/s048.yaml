reviewed_divergences:
  - side: shuck-only
    reason: >-
      S048 intentionally covers dollar-prefixed variables in `((...))`
      command-style arithmetic as its own rule, so these diagnostics are
      expected when Shuck keeps that context separate from `$((...))`.
  - side: shellcheck-only
    reason: >-
      The current ShellCheck build reports `$((...))` expansion-form
      arithmetic under SC2004 as part of the same code family, but those
      expansion cases belong to S045 rather than S048.
